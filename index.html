<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Góc nhỏ Jena</title>

<style>

/* reset */

body{
margin:0;
font-family:system-ui;
color:white;

/* background */

background:url("background.jpg") center/cover no-repeat fixed;
}

/* header */

.header{
position:fixed;
top:20px;
left:30px;
z-index:10;
}

.header h1{
margin:0;
font-size:28px;
font-weight:600;
}

/* vùng nội dung */

.content{
max-width:800px;
margin:120px auto;
padding:20px;
}

/* glass card */

.glass-card{

padding:40px;

background:rgba(255,255,255,0.15);

border-radius:20px;

backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.3);

box-shadow:0 10px 40px rgba(0,0,0,0.3);

}

/* tiêu đề bài */

.glass-card h2{
margin-top:0;
font-size:28px;
}

/* đoạn văn */

.glass-card p{
font-size:18px;
line-height:1.6;
opacity:0.9;
}

/* hiệu ứng hover */

.glass-card:hover{
transform:translateY(-5px);
transition:0.3s;
}

</style>

<script>

// chặn chuột phải
document.addEventListener("contextmenu", function(e){
e.preventDefault();
});

// chặn copy
document.addEventListener("copy", function(e){
e.preventDefault();
});

// chặn phím tắt
document.onkeydown = function(e){

if(e.ctrlKey && e.key === "c"){return false;}
if(e.ctrlKey && e.key === "u"){return false;}
if(e.ctrlKey && e.key === "s"){return false;}
if(e.ctrlKey && e.key === "a"){return false;}

};

</script>

</head>

<body>

<header class="header">
<h1>Góc nhỏ Jena</h1>
</header>

<main class="content">

<article class="glass-card">

<h2>Bài viết đầu tiên</h2>

<p>
Ghi chép, tiểu luận và suy tư về triết học.
</p>

<p>
Bạn có thể thay nội dung này bằng bài viết thật của mình.
</p>

</article>

</main>

</body>

</html>
